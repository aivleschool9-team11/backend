version: 0.0
os: linux

files:
  - source: build/libs/
    destination: /home/ec2-user/app/
  - source: deploy-scripts/
    destination: /home/ec2-user/deploy-scripts/

permissions:
  - object: /home/ec2-user/deploy-scripts/
    mode: "755"

hooks:
  ApplicationStop:
    - location: deploy-scripts/stop.sh
      timeout: 60
      runas: ec2-user
  ApplicationStart:
    - location: deploy-scripts/start.sh
      timeout: 120
      runas: ec2-user
  ValidateService:
    - location: deploy-scripts/health_check.sh
      timeout: 60
      runas: ec2-user