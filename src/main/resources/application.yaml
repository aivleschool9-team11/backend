server:
  port: 8080

spring:
  application:
    name: bookapp

  config:
    import: "aws-parameter-store:/bookapp/"

  datasource:
    url: ${db-url}
    driver-class-name: org.postgresql.Driver
    username: ${db-username}
    password: ${db-password}

  jpa:
    hibernate:
      ddl-auto: update 
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-request-size: 10MB
      max-file-size: 10MB

cloud:
  aws:
    region:
      static: ap-northeast-2
